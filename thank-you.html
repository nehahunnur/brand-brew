<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Message Sent — Brand Brew</title>
<link rel="icon" href="assets/logo-crop.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="antialiased">

<div class="fixed inset-0 bg-grid pointer-events-none -z-10"></div>

<header class="border-b border-[color:var(--border)]">
  <div class="max-w-7xl mx-auto px-6 lg:px-10 h-[76px] flex items-center">
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/logo-crop.png" alt="Brand Brew logo" class="h-10 w-auto object-contain" />
      <span class="font-semibold text-[17px] tracking-tight leading-none">Brand Brew</span>
    </a>
  </div>
</header>

<main class="relative overflow-hidden min-h-[70vh] flex items-center justify-center">
  <div class="absolute inset-0 fade-mask bg-grid opacity-60"></div>
  <div class="absolute top-[-10%] left-1/2 -translate-x-1/2 w-[700px] h-[420px] rounded-full blur-[140px] opacity-20" style="background: radial-gradient(circle, var(--accent), transparent 70%)"></div>

  <div class="relative z-10 max-w-lg mx-auto px-6 text-center py-24">
    <div class="mx-auto mb-8 h-14 w-14 grid place-items-center border border-[color:var(--border)]" style="color: var(--accent)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1 class="font-semibold text-3xl sm:text-4xl tracking-tight leading-[1.1] mb-4">Message sent — thank you.</h1>
    <p class="text-[15px] leading-[1.7] text-[color:var(--text-dim)] mb-10">We've got your details and will be in touch within 48 hours. If it's urgent, chat with us on WhatsApp in the meantime.</p>
    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="index.html" class="w-full sm:w-auto text-center bg-[color:var(--accent)] text-[color:var(--accent-ink)] px-7 h-12 grid place-items-center text-[13px] font-semibold uppercase tracking-[0.1em] hover:brightness-110 active:scale-[0.98] transition-all duration-500">
        Back to Home
      </a>
      <a href="https://wa.me/918867115663" target="_blank" rel="noopener" class="w-full sm:w-auto text-center border border-[color:var(--border-strong)] px-7 h-12 grid place-items-center text-[13px] font-semibold uppercase tracking-[0.1em] hover:border-[color:var(--accent)] hover:text-[color:var(--accent)] active:scale-[0.98] transition-all duration-500">
        Chat on WhatsApp
      </a>
    </div>
  </div>
</main>

<footer class="border-t border-[color:var(--border)]">
  <div class="max-w-6xl mx-auto px-6 lg:px-10 py-8 text-center">
    <p class="mono text-[11px] text-[color:var(--text-faint)]">&copy; 2026 Brand Brew. All rights reserved.</p>
  </div>
</footer>

</body>
</html>
